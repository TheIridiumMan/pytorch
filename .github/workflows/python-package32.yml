# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    

    steps:

    - name: checkout repo
      uses: actions/checkout@v4
    - name: Set up Python 3.9 (32-bit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        architecture: 'x86'
    - name: Show current directory and list files
      run: |
        echo "Current directory: $(pwd)"
        echo "Listing root directory contents:"
        ls
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        pip install setuptools packaging optree astunparse expecttest!=0.2.0 hypothesis numpy psutil pyyaml requests types-dataclasses typing-extensions>=4.8.0 sympy filelock networkx jinja2 fsspec lintrunner ninja
    - name: Setup MSVC Developer Command Prompt
      uses: TheMrMilchmann/setup-msvc-dev@v3.0.1
      with:
        arch: x86
            

    - name: Start Building
      run: |
        py setup.py bdist_wheel
